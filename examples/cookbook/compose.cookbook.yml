services:
  chromadb:
    image: chromadb/chroma:1.3.3
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/data
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-lc",
          "echo > /dev/tcp/127.0.0.1/8000",
        ]
      interval: 5s
      timeout: 3s
      retries: 20

  qdrant:
    image: qdrant/qdrant:v1.17.0
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-lc",
          "echo > /dev/tcp/127.0.0.1/6333",
        ]
      interval: 5s
      timeout: 3s
      retries: 20

  pgvector:
    image: pgvector/pgvector:pg16
    ports:
      - "5439:5432"
    environment:
      POSTGRES_DB: anvia
      POSTGRES_USER: anvia
      POSTGRES_PASSWORD: anvia
    volumes:
      - pgvector-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U anvia -d anvia",
        ]
      interval: 5s
      timeout: 3s
      retries: 20

  milvus:
    image: milvusdb/milvus:v2.5.17
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_USE_EMBED: "true"
      ETCD_DATA_DIR: /var/lib/milvus/etcd
      COMMON_STORAGETYPE: local
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus-data:/var/lib/milvus
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-lc",
          "curl -sf http://127.0.0.1:9091/healthz",
        ]
      interval: 5s
      timeout: 3s
      retries: 30

volumes:
  chroma-data:
  qdrant-data:
  pgvector-data:
  milvus-data:
