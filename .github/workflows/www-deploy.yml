name: Deploy WWW

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: www-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy www
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.4
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate package changelog docs
        run: pnpm --filter www generate:package-changelogs

      - name: Check www reference coverage
        run: pnpm --filter www reference-check

      - name: Deploy www
        run: pnpm --filter www run deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
